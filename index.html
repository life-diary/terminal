<script>
    // CYBER ALIGNMENT & POPUP BLOCKER INTERCEPT
    window.addEventListener('DOMContentLoaded', () => {
        // 1. Create a custom error text box inside the card UI dynamically
        const card = document.querySelector('.staticrypt-container') || document.querySelector('main') || document.body;
        const errorDiv = document.createElement('div');
        errorDiv.id = 'cyber-error';
        errorDiv.innerText = '[!] ACCESS DENIED';
        card.appendChild(errorDiv);

        // 2. Hijack the native alert popup entirely
        window.alert = function(message) {
            console.log("Blocked alert message: " + message);
            
            // Instantly toggle our neon error text inside the box instead of popping up
            const uiError = document.getElementById('cyber-error');
            if (uiError) {
                uiError.style.display = 'block';
                // Make it shake or flash for effect if needed
                setTimeout(() => { uiError.style.opacity = '0.5'; }, 150);
                setTimeout(() => { uiError.style.opacity = '1'; }, 300);
            }
            return true; 
        };
    });
</script>
