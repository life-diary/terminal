<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💾 Hub 02: The Vault</title>
    <style>
        body {
            background-color: #000000;
            color: #FF00FF;
            font-family: "Courier New", Courier, monospace;
            padding: 60px 20px;
        }
        table {
            border: 4px outset #FF00FF;
            background-color: #110011;
            padding: 25px;
            width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #00FF00;
            font-family: 'Impact', sans-serif;
            letter-spacing: 1px;
            margin-top: 0;
        }
        .search-container {
            text-align: center;
            margin: 15px 0 25px 0;
        }
        .retro-search {
            background-color: #000;
            border: 2px inset #FF00FF;
            color: #FF00FF;
            font-family: "Courier New", monospace;
            padding: 5px;
            width: 70%;
        }
        .entry-list {
            margin: 20px 0;
            padding: 0 10px;
        }
        .entry-item {
            border-bottom: 1px dotted #FF00FF;
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .entry-date {
            color: #00FFFF;
        }
        a {
            color: #FF00FF;
            font-weight: bold;
        }
        a:hover {
            color: #00FF00;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #00FFFF;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td>
                <h2>📼 THE MEMORY VAULT</h2>
                
                <div class="search-container">
                    <input type="text" id="diarySearch" class="retro-search" placeholder="Type to filter memories..." onkeyup="filterDiary()">
                </div>
                
                <div class="entry-list" id="diaryList">
                    <div class="entry-item">
                        <a href="concert-2026.html">Concert night was absolutely unreal</a>
                      
                    </div>
                    <div class="entry-item">
                        <a href="roadtrip.html">The 3 AM road trip fiasco</a>
                       
                    </div>
                    <div class="entry-item">
                        <a href="finished-project.html">Finally finished building the custom build</a>
                        
                    </div>
                </div>

                <a href="index.html" class="back-link">&lt;&lt; BACK TO HOMEPAGE</a>
            </td>
        </tr>
    </table>

    <script>
        function filterDiary() {
            let input = document.getElementById('diarySearch').value.toLowerCase();
            let items = document.getElementById('diaryList').getElementsByClassName('entry-item');
            
            for (let i = 0; i < items.length; i++) {
                let text = items[i].getElementsByTagName('a')[0].textContent;
                if (text.toLowerCase().indexOf(input) > -1) {
                    items[i].style.styleContainer = "flex"; // keeps the flexbox alignment intact
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
